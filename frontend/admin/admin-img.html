<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>body{
  font-family:sans-serif;
  padding:20px;
  background:#f4f7fb;
}

h2{
  text-align:center;
}

form{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}

input,button{
  padding:8px;
}

#imageList{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.card img{
  width:100%;
  height:150px;
  object-fit:contain;
}

.card button{
  background:red;
  color:white;
  border:none;
  margin-top:5px;
  cursor:pointer;
}</style>
</head>

<body>

<h2>📊 Admin Dashboard</h2>

<!-- UPLOAD FORM -->
<form id="uploadForm">
  <input type="file" name="image" required>
  <input type="text" name="caption" placeholder="Enter caption" required>
  <button type="submit">Upload</button>
</form>

<hr>

<!-- IMAGE LIST -->
<div id="imageList"></div>

<script>const form = document.getElementById("uploadForm");
const imageList = document.getElementById("imageList");

/* LOAD IMAGES */
function loadImages(){
  fetch("http://localhost:3000/images")
    .then(res => res.json())
    .then(data => {

      imageList.innerHTML = "";

      data.forEach(img => {

        const div = document.createElement("div");
        div.classList.add("card");

        div.innerHTML = `
          <img src="http://localhost:3000/uploads/${img.filename}">
          <p>${img.caption}</p>
          <button onclick="deleteImage(${img.id})">Delete</button>
        `;

        imageList.appendChild(div);
      });

    });
}

/* UPLOAD */
form.addEventListener("submit", e => {
  e.preventDefault();

  const formData = new FormData(form);

  fetch("http://localhost:3000/images/upload", {
    method:"POST",
    body:formData
  })
  .then(() => {
    form.reset();
    loadImages();
  });
});

/* DELETE */
function deleteImage(id){
  fetch(`http://localhost:3000/images/${id}`, {
    method:"DELETE"
  })
  .then(() => loadImages());
}

/* INIT */
loadImages();</script>

</body>
</html>
