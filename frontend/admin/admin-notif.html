<style>* {
  box-sizing: border-box;
}

.admin-notice {
  padding: 40px;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1a1b3a, #0f172a 60%, #0b1020);
  color: white;
  overflow-x: hidden; /* 🔥 IMPORTANT FIX */
}

.admin-notice h2 {
  text-align: center;
  margin: 15px 0;
  color: #e9d5ff;
  font-size: 22px;
}

/* ================= FORM FIX ================= */
#noticeForm {
  display: flex;
  flex-direction: column;
  gap: 10px;

  width: 100%;
  max-width: 500px;

  margin: 0 auto 25px auto;

  padding: 15px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
}

#noticeForm input,
#noticeForm textarea {
  width: 100%;               /* 🔥 IMPORTANT FIX */
  padding: 10px;
  border: none;
  border-radius: 10px;

  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
  font-size: 13px;
}

#noticeForm textarea {
  resize: none;
  min-height: 90px;
}

/* BUTTON */
#noticeForm button {
  width: 100%;              /* 🔥 IMPORTANT FIX */
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;

  padding: 9px;
  border: none;
  border-radius: 10px;

  cursor: pointer;
  font-size: 13px;
}

/* ================= CARD ================= */
.notice-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);

  padding: 15px;
  margin: 12px auto;

  width: calc(100% - 24px);  /* 🔥 IMPORTANT FIX (LEFT-RIGHT GAP) */
  max-width: 900px;

  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
}

.notice-card h3 {
  font-size: 16px;
  color: #f5d0fe;
}

.notice-card p {
  font-size: 13px;
  color: #cbd5e1;
}

.notice-card small {
  display: block;
  margin-top: 5px;
  color: #94a3b8;
}

/* ================= ACTIONS ================= */
.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* 🔥 ULTRA SMALL BUTTONS */
.actions a,
.actions button {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  padding: 4px 7px;
  font-size: 14px;

  border-radius: 12px;
  border: none;

  cursor: pointer;
  color: white;
  text-decoration: none;

  transition: 0.25s;
  line-height: 1;
}

/* VIEW */
.actions a {
  background: linear-gradient(135deg, #3b82f6, #7c3aed);
}

/* DELETE */
.actions button {
  background: linear-gradient(135deg, #ef4444, #b91c1c);
}

/* hover */
.actions a:hover,
.actions button:hover {
  transform: scale(1.05);
}

/* ================= MOBILE FIX ================= */
@media (max-width: 768px) {

  .admin-notice {
    padding: 12px;
  }

  #noticeForm {
    width: 100%;
    max-width: 100%;
    padding: 12px;
  }

  .notice-card {
    width: calc(100% - 20px);
    margin: 10px auto;
    padding: 12px;
  }

  .actions a,
  .actions button {
    font-size: 9px;
    padding: 3px 6px;
  }
}</style>

<section class="admin-notice">

  <h2>📢 Add Notification</h2>

  <form id="noticeForm" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Title" required>
    <textarea name="message" placeholder="Message" required></textarea>
    <input type="file" name="pdf">

    <button type="submit">➕ Add Notification</button>
  </form>

  <h2>📋 All Notifications</h2>
  <div id="noticeList"></div>

</section>

<script>
document.getElementById("noticeForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  await fetch("http://localhost:3000/notifications/add", {
    method: "POST",
    body: formData
  });

  e.target.reset();
  loadNotifications();
});


/* LOAD NOTIFICATIONS */
async function loadNotifications() {
  const res = await fetch("http://localhost:3000/notifications");
  const data = await res.json();

  const box = document.getElementById("noticeList");
  box.innerHTML = "";

  data.forEach(n => {
    box.innerHTML += `
      <div class="notice-card">

        <h3>${n.title}</h3>
        <p>${n.message}</p>

        <small>🕒 ${new Date(n.created_at).toLocaleString()}</small>

        <div class="actions">

          ${n.pdf ? `
            <a href="http://localhost:3000/uploads/${n.pdf}" target="_blank">
              📄 PDF
            </a>
          ` : ""}

          <button onclick="deleteNotice(${n.id})">
            🗑 Delete
          </button>

        </div>

      </div>
    `;
  });
}


/* DELETE WITH CONFIRMATION */
async function deleteNotice(id) {

  const confirmDelete = confirm("⚠️ Are you sure you want to delete this notice?");

  if (!confirmDelete) {
    return; // user cancelled
  }

  try {
    await fetch("http://localhost:3000/notifications/" + id, {
      method: "DELETE"
    });

    alert("✅ Notice deleted successfully");

    loadNotifications();

  } catch (error) {
    console.error(error);
    alert("❌ Error deleting notice");
  }
}


/* INITIAL LOAD */
loadNotifications();
</script>
