<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Admin Login</title>

<style>

/* ================= GLOBAL ================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Arial", sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* Animated dark gradient background */
  background: linear-gradient(-45deg, #0f172a, #1e1b4b, #30135c, #0f172a);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;

  padding: 20px;
  overflow: hidden;
}

/* background animation */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* floating glow particles */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  z-index: 0;
}

body::before {
  background: #a855f7;
  top: 10%;
  left: 10%;
  animation: float1 8s ease-in-out infinite;
}

body::after {
  background: #ec4899;
  bottom: 10%;
  right: 10%;
  animation: float2 10s ease-in-out infinite;
}

@keyframes float1 {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(40px); }
}

@keyframes float2 {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-40px); }
}

/* ================= LOGIN BOX ================= */

.login-box {
  position: relative;
  z-index: 1;

  width: 100%;
  max-width: 420px;

  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(15px);

  padding: 30px;
  border-radius: 18px;

  box-shadow: 0 0 25px rgba(168, 85, 247, 0.4),
              0 0 40px rgba(236, 72, 153, 0.2);

  border: 1px solid rgba(255, 255, 255, 0.08);

  animation: fadeUp 0.6s ease;
}

/* entry animation */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* ================= TITLE ================= */
.login-box h2 {
  text-align: center;
  font-size: 24px;

  background: linear-gradient(90deg, #a855f7, #ec4899);
  
  -webkit-background-clip: text;
  background-clip: text;

  -webkit-text-fill-color: transparent;
  color: transparent;

  margin-bottom: 25px;

  text-decoration: none;   /* 👈 IMPORTANT FIX */
  border: none;
  outline: none;
}

/* ================= INPUT ================= */

.input-box {
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 12px;

  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);

  border-radius: 10px;
  outline: none;

  color: #fff;
  font-size: 14px;

  transition: 0.3s;
}

.input-box input:focus {
  border-color: #a855f7;
  box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
  transform: scale(1.02);
}

/* ================= CAPTCHA ================= */

.captcha-box {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

#captchaCanvas {
  background: rgba(255, 255, 255, 0.08);
  border: 2px dashed #a855f7;
  border-radius: 10px;
  width: 100%;
  max-width: 200px;
}

.refresh-btn {
  width: 52px;
  height: 52px;

  border: none;
  border-radius: 10px;

  background: linear-gradient(135deg, #a855f7, #ec4899);
  color: white;

  font-size: 20px;
  cursor: pointer;

  transition: 0.4s;
}

.refresh-btn:hover {
  transform: rotate(180deg) scale(1.1);
  box-shadow: 0 0 15px #a855f7;
}

/* ================= BUTTONS ================= */

button {
  width: 100%;
  padding: 12px;

  border: none;
  border-radius: 10px;

  color: white;
  font-size: 15px;
  cursor: pointer;

  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);
}

button:active {
  transform: scale(0.98);
}

#sendOtpBtn {
  background: linear-gradient(135deg, #0f766e, #14b8a6);
}

#loginBtn {
  background: linear-gradient(135deg, #a855f7, #ec4899);
  display: none;
}

/* ================= OTP ================= */

#otpSection {
  display: none;
}

/* ================= MESSAGE ================= */

.msg {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
  font-weight: bold;
}

.success { color: #22c55e; }
.error { color: #ef4444; }

/* ================= FORGOT ================= */

.forgot {
  display: block;
  text-align: right;
  margin-top: 10px;

  color: #a855f7;
  font-size: 14px;
  text-decoration: none;
}

.forgot:hover {
  text-shadow: 0 0 8px #a855f7;
}

/* ================= LOADER ================= */

.loader-box {
  display: none;
  text-align: center;
  margin-top: 15px;
}

.loader {
  width: 40px;
  height: 40px;

  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #a855f7;

  animation: spin 0.8s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* ================= RESPONSIVE ================= */

@media (max-width: 768px) {
  .login-box {
    max-width: 380px;
  }
}

@media (max-width: 480px) {
  .login-box {
    padding: 20px;
  }

  .login-box h2 {
    font-size: 20px;
  }

  button {
    font-size: 14px;
  }
}

@media (max-width: 360px) {
  .login-box {
    padding: 15px;
  }
}

</style>
</head>
<body>

<div class="login-box">

  <h2>Admin Login</h2>

  <!-- USERNAME -->

  <div class="input-box">

    <input
      type="text"
      id="username"
      placeholder="Username"
    >

  </div>

  <!-- PASSWORD -->

  <div class="input-box">

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

  </div>

  <!-- CAPTCHA -->

  <div class="captcha-box">

    <canvas
      id="captchaCanvas"
      width="220"
      height="60"
    ></canvas>

    <button
      type="button"
      class="refresh-btn"
      onclick="generateCaptcha()"
    >
      ↻
    </button>

  </div>

  <!-- CAPTCHA INPUT -->

  <div class="input-box">

    <input
      type="text"
      id="captchaInput"
      placeholder="Enter Captcha"
    >

  </div>

  <!-- SEND OTP -->

  <button
    id="sendOtpBtn"
    onclick="sendOTP()"
  >
    Send OTP
  </button>

  <!-- OTP SECTION -->

  <div id="otpSection">

    <div
      class="input-box"
      style="margin-top:15px;"
    >

      <input
        type="text"
        id="otp"
        placeholder="Enter OTP"
        maxlength="6"
      >

    </div>

    <button
      id="loginBtn"
      onclick="login()"
    >
      Login
    </button>

  </div>

  <!-- FORGOT PASSWORD -->

 <a
  href="forgot.html"
  class="forgot"
>
  Forgot Password?
</a>

  <!-- LOADER -->

  <div
    class="loader-box"
    id="loader"
  >

    <div class="loader"></div>

    <p>Please wait...</p>

  </div>

  <!-- MESSAGE -->

  <div
    class="msg"
    id="msg"
  ></div>

</div>

<script>

/* ================= CAPTCHA ================= */

let generatedCaptcha = "";

function generateCaptcha(){

  const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

  generatedCaptcha = "";

  for(let i = 0; i < 6; i++){

    generatedCaptcha += chars.charAt(
      Math.floor(Math.random() * chars.length)
    );

  }

  drawCaptcha(generatedCaptcha);

}

/* ================= DRAW CAPTCHA ================= */

function drawCaptcha(text){

  const canvas =
    document.getElementById("captchaCanvas");

  const ctx =
    canvas.getContext("2d");

  /* CLEAR */

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  /* BACKGROUND */

  const gradient =
    ctx.createLinearGradient(
      0,
      0,
      canvas.width,
      canvas.height
    );

  gradient.addColorStop(0,"#e2e8f0");
  gradient.addColorStop(1,"#cbd5e1");

  ctx.fillStyle = gradient;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  /* RANDOM LINES */

  for(let i = 0; i < 8; i++){

    ctx.strokeStyle =
      `rgba(${Math.random()*255},
      ${Math.random()*255},
      ${Math.random()*255},0.7)`;

    ctx.beginPath();

    ctx.moveTo(
      Math.random() * canvas.width,
      Math.random() * canvas.height
    );

    ctx.lineTo(
      Math.random() * canvas.width,
      Math.random() * canvas.height
    );

    ctx.stroke();

  }

  /* RANDOM DOTS */

  for(let i = 0; i < 80; i++){

    ctx.fillStyle =
      `rgba(${Math.random()*255},
      ${Math.random()*255},
      ${Math.random()*255},0.8)`;

    ctx.beginPath();

    ctx.arc(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      1.5,
      0,
      Math.PI * 2
    );

    ctx.fill();

  }

  /* TEXT */

  for(let i = 0; i < text.length; i++){

    const x = 25 + i * 30;

    const y =
      35 + Math.random() * 10;

    const angle =
      (Math.random() - 0.5) * 0.6;

    ctx.save();

    ctx.translate(x,y);

    ctx.rotate(angle);

    ctx.font =
      "bold 28px Arial";

    ctx.fillStyle =
      `rgb(
        ${Math.random()*100},
        ${Math.random()*100},
        ${Math.random()*100}
      )`;

    ctx.fillText(
      text[i],
      0,
      0
    );

    ctx.restore();

  }

}

/* PAGE LOAD */

generateCaptcha();

/* ================= MESSAGE ================= */

function showMessage(text,type){

  const msg =
    document.getElementById("msg");

  msg.innerText = text;

  if(type === "success"){

    msg.className = "msg success";

  }else{

    msg.className = "msg error";

  }

}

/* ================= LOADER ================= */

function showLoader(){

  document.getElementById("loader")
    .style.display = "block";

}

function hideLoader(){

  document.getElementById("loader")
    .style.display = "none";

}

/* ================= SEND OTP ================= */

async function sendOTP(){

  const username =
    document.getElementById("username")
    .value
    .trim();

  const password =
    document.getElementById("password")
    .value
    .trim();

  const captchaInput =
    document.getElementById("captchaInput")
    .value
    .trim();

  /* VALIDATION */

  if(username === ""){

    showMessage(
      "Enter Username",
      "error"
    );

    return;
  }

  if(password === ""){

    showMessage(
      "Enter Password",
      "error"
    );

    return;
  }

  if(captchaInput === ""){

    showMessage(
      "Enter Captcha",
      "error"
    );

    return;
  }

  if(
    captchaInput.toUpperCase()
    !==
    generatedCaptcha.toUpperCase()
  ){

    showMessage(
      "Wrong Captcha",
      "error"
    );

    generateCaptcha();

    document.getElementById("captchaInput")
      .value = "";

    return;
  }

  /* BUTTON */

  const btn =
    document.getElementById("sendOtpBtn");

  btn.disabled = true;

  btn.innerText = "Checking...";

  showLoader();

  try{

    const res = await fetch(

      "http://localhost:3000/send-otp",

      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          username,
          password
        }),

        signal:AbortSignal.timeout(10000)

      }

    );

    const data =
      await res.json();

    hideLoader();

    if(data.success){

      showMessage(
        "OTP Sent Successfully",
        "success"
      );

      btn.innerText = "OTP Sent";

      /* SHOW OTP */

      document.getElementById("otpSection")
        .style.display = "block";

      document.getElementById("loginBtn")
        .style.display = "block";

    }else{

      btn.disabled = false;

      btn.innerText = "Send OTP";

      generateCaptcha();

      showMessage(
        data.message,
        "error"
      );

    }

  }catch(error){

    hideLoader();

    btn.disabled = false;

    btn.innerText = "Send OTP";

    showMessage(
      "Server Error",
      "error"
    );

  }

}

/* ================= LOGIN ================= */

async function login(){

  const username =
    document.getElementById("username")
    .value
    .trim();

  const password =
    document.getElementById("password")
    .value
    .trim();

  const otp =
    document.getElementById("otp")
    .value
    .trim()
    .toUpperCase();

  if(otp === ""){

    showMessage(
      "Enter OTP",
      "error"
    );

    return;
  }

  const btn =
    document.getElementById("loginBtn");

  btn.disabled = true;

  btn.innerText = "Please Wait...";

  showLoader();

  try{

    const res = await fetch(

      "http://localhost:3000/login",

      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          username,
          password,
          otp
        }),

        signal:AbortSignal.timeout(10000)

      }

    );

    const data =
      await res.json();

    hideLoader();

    if(data.success){

      showMessage(
        "Login Successful",
        "success"
      );

      btn.innerText = "Success";

      setTimeout(()=>{

        window.location.href =
          "admin-dashboard.html";

      },1000);

    }else{

      btn.disabled = false;

      btn.innerText = "Login";

      showMessage(
        data.message,
        "error"
      );

    }

  }catch(error){

    hideLoader();

    btn.disabled = false;

    btn.innerText = "Login";

    showMessage(
      "Server Error",
      "error"
    );

  }

}

/* ================= ENTER SUPPORT ================= */

document.addEventListener(
  "keydown",
  function(e){

    if(e.key === "Enter"){

      const otpVisible =
        document.getElementById(
          "otpSection"
        ).style.display;

      if(otpVisible === "block"){

        login();

      }else{

        sendOTP();

      }

    }

  }
);

</script>

</body>
</html>
