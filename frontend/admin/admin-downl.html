<style>
.admin-downloads {
  padding: 40px;
  min-height: 100vh;

  /* 🔥 PREMIUM LIGHT GLASS DARK GRADIENT */
  background: radial-gradient(circle at top, #1b2a4a, #0f172a 60%, #0b1020);
  color: rgb(255, 255, 255);
}

/* TITLE */
.admin-downloads h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;
  color: #e9d5ff;
}

/* ================= FORMS ================= */
.upload-form,
.admin-filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 15px 0;
}

.upload-form input,
.upload-form select,
.admin-filters select {
  padding: 9px;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  min-width: 140px;

  /* GLASS INPUT */
  background: rgba(255,255,255,0.08);
  color: rgb(248, 248, 248);
  outline: none;
  backdrop-filter: blur(10px);
}
.upload-form select option,
.admin-filters select option {
  color: #000;        /* 👈 only dropdown items black */
  background: #fff;    /* clean readable background */
}

.upload-form input::placeholder {
  color: #ebecee;
}

/* UPLOAD BUTTON */
.upload-form button {
  padding: 9px 14px;
  border: none;
  border-radius: 10px;
  font-size: 13px;

  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: rgb(0, 0, 0);
  cursor: pointer;
  transition: 0.3s;
}

.upload-form button:hover {
  transform: scale(1.05);
}

/* ================= LIST WRAPPER (IMPORTANT FIX) ================= */
#adminList {
  padding: 0 15px;   /* 👈 LEFT + RIGHT SAME MARGIN FIX */
}

/* ================= CARD ================= */
.admin-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);

  padding: 15px;
  margin: 12px auto;

  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);

  max-width: 900px;

  transition: 0.3s;
}

.admin-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(139,92,246,0.25);
}

/* TEXT */
.admin-card h3 {
  font-size: 16px;
  color: #f5d0fe;
}

.admin-card p {
  font-size: 13px;
  color: #cbd5e1;
}

/* ================= BUTTONS (PREMIUM SMALL) ================= */
.admin-card a,
.admin-card button {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  padding: 5px 10px;
  font-size: 12px;
  border-radius: 20px;

  border: none;
  cursor: pointer;
  margin-top: 8px;
  margin-right: 6px;

  color: rgb(255, 255, 255);
  transition: 0.3s;
}

/* VIEW */
.admin-card a {
  background: linear-gradient(135deg, #3b82f6, #7c3aed);
}

/* DELETE */
.admin-card button {
  background: linear-gradient(135deg, #ef4444, #b91c1c);
}

.admin-card a:hover,
.admin-card button:hover {
  transform: scale(1.05);
}

/* ================= NO DATA ================= */
.no-data {
  text-align: center;
  padding: 20px;
  margin: 20px 15px;   /* 👈 equal margin fix */
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  color: #c084fc;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  .admin-downloads {
    padding: 15px;
  }

  h2 {
    font-size: 18px;
  }

  .upload-form,
  .admin-filters {
    flex-direction: column;
  }

  .upload-form input,
  .upload-form select,
  .admin-filters select {
    width: 100%;
  }

  .upload-form button {
    width: 100%;
  }

  /* CARD FULL WIDTH WITH PROPER SIDE GAP */
  .admin-card {
    margin: 10px 15px;   /* 👈 LEFT + RIGHT SAME GAP */
  }

  .admin-card a,
  .admin-card button {
    width: auto;
    font-size: 12px;
    padding: 6px 10px;
  }
}
</style>
<section class="admin-downloads">

  <h2>🛠️ Admin Downloads Manager</h2>

  <!-- ADD FORM -->
  <form id="downloadForm" class="upload-form">

    <input type="text" id="title" placeholder="Title" required>

    <select id="class" required>
      <option value="">Select Class</option>
      <option>6</option>
      <option>7</option>
      <option>8</option>
      <option>9</option>
      <option>10</option>
      <option>11</option>
      <option>12</option>
      
    </select>

    <select id="year" required>
      <option value="">Select Year</option>
    </select>

    <select id="category" required>
      <option value="">Select Category</option>
      <option>Model Paper</option>
      <option>Syllabus</option>
      <option>PYQ</option>
      <option>Other</option>
    </select>

    <input type="file" id="file" accept="application/pdf" required>

    <button type="submit">➕ Upload</button>

  </form>

  <hr>

  <!-- FILTERS -->
  <div class="admin-filters">

    <select id="filterClass">
      <option value="">All Class</option>
      <option>6</option>
      <option>7</option>
      <option>8</option>
      <option>9</option>
      <option>10</option>
      <option>11</option>
      <option>12</option>
      
    </select>

    <select id="filterYear">
      <option value="">All Year</option>
    </select>

    <select id="filterCategory">
      <option value="">All Category</option>
      <option>Model Paper</option>
      <option>Syllabus</option>
      <option>PYQ</option>
      <option>Other</option>
    </select>

  </div>

  <!-- LIST -->
  <div id="adminList"></div>

</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("downloadForm");
  const list = document.getElementById("adminList");

  const yearSelect = document.getElementById("year");
  const filterYear = document.getElementById("filterYear");

  /* ================= YEAR DROPDOWN ================= */
  for (let y = 2020; y <= 2030; y++) {
    yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
    filterYear.innerHTML += `<option value="${y}">${y}</option>`;
  }

  /* ================= LOAD DATA ================= */
  function loadDownloads() {

    const cls = document.getElementById("filterClass").value;
    const year = document.getElementById("filterYear").value;
    const category = document.getElementById("filterCategory").value;

    let params = [];
    if (cls) params.push(`class=${cls}`);
    if (year) params.push(`year=${year}`);
    if (category) params.push(`category=${category}`);

    let url = "http://localhost:3000/downloads";
    if (params.length > 0) url += "?" + params.join("&");

    fetch(url)
      .then(res => res.json())
      .then(data => {

        list.innerHTML = "";

        if (!data || data.length === 0) {
          list.innerHTML = `<div class="no-data">❌ No Data Found</div>`;
          return;
        }

        data.forEach(item => {
          list.innerHTML += `
            <div class="admin-card">

              <h3>${item.title}</h3>

              <p>
                Class: ${item.class} |
                Year: ${item.year} |
                Category: ${item.category}
              </p>

              <a href="http://localhost:3000/uploads/${item.file}" target="_blank">
                📄 View PDF
              </a>

              <button onclick="deleteFile(${item.id})">❌ Delete</button>

            </div>
          `;
        });

      });
  }

  loadDownloads();

  /* ================= ADD FILE ================= */
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData();
    formData.append("title", document.getElementById("title").value);
    formData.append("class", document.getElementById("class").value);
    formData.append("year", document.getElementById("year").value);
    formData.append("category", document.getElementById("category").value);
    formData.append("pdf", document.getElementById("file").files[0]);

    await fetch("http://localhost:3000/downloads/add", {
      method: "POST",
      body: formData
    });

    form.reset();
    loadDownloads();
  });

  /* ================= DELETE ================= */
  window.deleteFile = function(id) {

    if (!confirm("Are you sure?")) return;

    fetch(`http://localhost:3000/downloads/${id}`, {
      method: "DELETE"
    })
    .then(() => loadDownloads());

  };

  /* ================= FILTER CHANGE ================= */
  document.querySelectorAll(".admin-filters select").forEach(el => {
    el.addEventListener("change", loadDownloads);
  });

});
</script>
