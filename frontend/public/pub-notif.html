<style>.notice-section{
  padding:40px 20px;
  background:#ffffff;
  color:#111;
  font-family:Arial, sans-serif;
}

/* TITLE */
.title{
  text-align:center;
  font-size:28px;
  margin-bottom:25px;
  color:#ff6f00;
  position:relative;
  animation:fadeDown 0.6s ease;
}

.title::after{
  content:"";
  width:80px;
  height:3px;
  background:#000;
  display:block;
  margin:8px auto 0;
  border-radius:5px;
}

/* LIST */
.notice-list{
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* CARD */
.notice-card{
  background:#6867672a;
  border:1px solid #eee;
  border-left:6px solid #ff6f00;
  padding:16px;
  border-radius:10px;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
  transition:all 0.3s ease;

  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.6s forwards;
}

/* HOVER */
.notice-card:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  border-left-color:#000;
}

/* TEXT */
.notice-card h3{
  color:#000;
  margin-bottom:6px;
  font-size:18px;
}

.notice-card p{
  color:#444;
  margin:5px 0;
  line-height:1.5;
  font-size:15px;
}

.notice-card small{
  color:#ff6f00;
  font-weight:500;
}

/* BUTTON */
.download-btn{
  display:inline-block;
  margin-top:10px;
  padding:7px 14px;
  background:#ff6f00;
  color:#fff;
  border-radius:6px;
  text-decoration:none;
  font-size:13px;
  transition:all 0.3s ease;
}

.download-btn:hover{
  background:#000;
  transform:scale(1.05);
}


/* NEW BADGE */
.notice-card{
  position:relative;
}

/* NEW BADGE */
.badge{
  position:absolute;
  top:8px;
  right:8px;

  background:#072968;
  color:#fff;

  font-size:9px;        /* smaller */
  padding:2px 7px;      /* compact */
  border-radius:12px;

  font-weight:600;
  letter-spacing:0.5px;

  animation:softBlink 1.8s infinite;
  box-shadow:0 0 6px rgba(255,111,0,0.25);
}

/* SOFT BLINK (less aggressive) */
@keyframes softBlink{
  0%{
    opacity:1;
    transform:scale(1);
  }
  50%{
    opacity:0.6;
    transform:scale(1.05);
  }
  100%{
    opacity:1;
    transform:scale(1);
  }
}

@keyframes blinkPulse{
  0%{opacity:1; transform:scale(1);}
  50%{opacity:0.4; transform:scale(1.15);}
  100%{opacity:1; transform:scale(1);}
}



/* ANIMATIONS */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeDown{
  from{
    opacity:0;
    transform:translateY(-15px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ================= RESPONSIVE DESIGN ================= */

/* TABLET */
@media (max-width: 768px){
  .title{
    font-size:24px;
  }

  .notice-card{
    padding:14px;
  }

  .notice-card h3{
    font-size:16px;
  }

  .notice-card p{
    font-size:14px;
  }
}

/* MOBILE */
@media (max-width: 480px){
  .notice-section{
    padding:25px 12px;
  }

  .title{
    font-size:20px;
  }

  .notice-card{
    padding:12px;
    border-left-width:4px;
  }

  .notice-card h3{
    font-size:15px;
  }

  .notice-card p{
    font-size:13px;
  }

  .download-btn{
    font-size:12px;
    padding:6px 12px;
  }
}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:5px;

  margin-top:15px;
  margin-bottom:12px;
  margin-left:15px;

  padding:5px 10px;   /* 👈 reduced */
  font-size:13px;     /* 👈 smaller text */

  background:#9e5f0d;
  color:#fff;

  text-decoration:none;
  font-weight:500;

  border-radius:6px;  /* slightly smaller radius */

  transition:all 0.3s ease;
  position:relative;
  overflow:hidden;
}
/* hover */
.back-btn:hover{
  background:#000;
  transform:translateX(-6px);
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ripple */
.back-btn::after{
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  transition:width 0.5s ease, height 0.5s ease;
}

.back-btn:hover::after{
  width:200px;
  height:200px;
}

/* animation */
@keyframes fadeInLeft{
  from{opacity:0; transform:translateX(-20px);}
  to{opacity:1; transform:translateX(0);}
}

@media(max-width:768px){

  @media(max-width:768px){
  .back-btn{
    padding:6px 8px;
    font-size:12px;
    margin-left:10px;
  }
}
  .back-btn::before{
    content:"←";
    font-size:18px;
    color:white;
  }

  /* hide ripple overflow issue fix */
  .back-btn span{
    display:none;
  }
}


/* ================= FOOTER BASE ================= */
.glass-footer {
  position: relative;
  overflow: hidden;

background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  padding: 50px 20px 20px;

  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255, 255, 255, 0.1);

  font-family: "Poppins", sans-serif;
}

/* ================= RGB TOP LIGHT ================= */
.glass-footer::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;

  background: linear-gradient(
    90deg,
    #ff004c,
    #ffcc00,
    #00ffcc,
    #0066ff,
    #ff00ff,
    #ff004c
  );

  background-size: 400% 100%;
  animation: rgbMove 6s linear infinite;

  box-shadow: 0 0 15px rgba(255, 0, 100, 0.6),
              0 0 25px rgba(0, 255, 200, 0.4);
}

/* RGB animation */
@keyframes rgbMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* ================= CONTAINER ================= */
.glass-container {
  max-width: 1100px;
  margin: auto;
}

/* ================= MAIN BOX ================= */
.glass-box.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 20px;
}

/* ================= BRAND FLEX ================= */
.brand-flex {
  display: flex;
  align-items: center;
  gap: 20px;

  background: rgba(255, 255, 255, 0.06);
  padding: 20px;
  border-radius: 16px;

  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);

  max-width: 800px;
  width: 100%;
}

/* ================= LOGO ================= */
.school-logo {
  width: 90px;
  height: 90px;
  object-fit: cover;

  border-radius: 12px;
  border: 2px solid rgba(255, 255, 255, 0.2);
}

/* ================= TEXT ================= */
.brand-flex h2 {
  margin: 0;
  font-size: 20px;
  color: #ffffff;
}

.brand-flex p {
  margin: 5px 0 0;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.7);
}

/* ================= FOOTER BOTTOM ================= */
.glass-bottom {
  margin-top: 25px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.6);
  text-align: center;
}

/* ================= DEVELOPER CREDIT ================= */
.dev-credit {
  margin-top: 10px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.6);
}

.dev-credit span {
  color: #ff4d6d;
  font-weight: 600;
}

/* ================= HOVER EFFECT ================= */
.brand-flex:hover {
  transform: translateY(-3px);
  transition: 0.3s ease;
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
}

/* ================= RESPONSIVE ================= */
@media (max-width: 600px) {
  .brand-flex {
    flex-direction: column;
    text-align: center;
  }

  .school-logo {
    width: 70px;
    height: 70px;
  }
}


/* =========================
   ANIMATION
========================= */
@keyframes glowMove {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 200% 50%;
  }
}

</style>
<section class="notice-section">
    <a href="../index.html" class="back-btn">← Back</a>

  <h2 class="title">Notifications</h2>

  <div id="noticeList" class="notice-list"></div>

  

</section>

<footer class="glass-footer">

  <div class="glass-container">

    <div class="glass-box brand">

  <div class="brand-flex">
    <img src="../1778132110413-ChatGPT Image May 7, 2026, 10_56_26 AM.png" alt="School Logo" class="school-logo">

    <div>
      <h2>Govt Sr. Sec. School Shilla</h2>
      <p>Empowering students with knowledge, discipline & excellence.</p>
    </div>
 



  <div class="glass-bottom">
    © 2026 Govt. Sr. Sec. School Shilla | All Rights Reserved
  </div>
  <div class="dev-credit">
  <p>Developed by <span>Vikshant Kralta</span></p>
</div>

</footer>
<script>
 fetch("http://localhost:3000/notifications")
  .then(res => res.json())
  .then(data => {

    const box = document.getElementById("noticeList");
    box.innerHTML = "";

    const now = new Date();

    data.forEach(n => {

      const created = new Date(n.created_at);

      // 24 hours logic
      const diffHours = (now - created) / (1000 * 60 * 60);

      const isNew = diffHours <= 24;

      box.innerHTML += `
        <div class="notice-card">

          ${isNew ? `<span class="badge">NEW</span>` : ""}

          <h3>${n.title}</h3>

          <p>${n.message || ""}</p>

          <small>📅 ${created.toLocaleString()}</small>

          ${n.pdf ? `
            <a class="download-btn" 
               href="http://localhost:3000/uploads/${n.pdf}" 
               download>
               📄 Download PDF
            </a>
          ` : ""}

        </div>
      `;
    });

  });

  </script>
